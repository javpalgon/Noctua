version: "3.9"

services: 
  postgres: 
    image: postgres:16
    container_name: noctua_postgres
    environment:
      POSTGRES_USER: noctua
      POSTGRES_PASSWORD: noctua_dev
      POSTGRES_DB: noctua
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    container_name: noctua_neo4j
    environment:
      NEO4J_AUTH: neo4j/noctua_dev
    ports:
      - "7474:7474"  # Browser
      - "7687:7687"  # Bolt (Driver python)
    volumes:
      - neo4jdata:/data
  
  web: 
    build: .
    container_name: noctua_web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - neo4j
    environment:
      DATABASE_URL: postgresql://noctua:noctua_dev@postgres:5432/noctua

volumes:
  pgdata:
  neo4jdata: