<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noctua Widget Test</title>
  <style>
    body {
      font-family: Inter, Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f3f4f6;
      color: #111827;
    }
    .card {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Prueba de widget Noctua</h1>
    <p>Abre el botón flotante abajo a la derecha y envía un mensaje.</p>
    <p>
      Si falla, revisa en consola del navegador que
      <code>data-api-base</code> y <code>data-client-id</code> sean correctos.
    </p>
  </div>

  <script
    src="http://localhost:5500/widget/noctua-widget.js"
    data-api-base="http://localhost:8000"
    data-client-id="da4650a4-1a5c-406e-a4f8-7b998cb97cce"
    data-company-name="Nike Shoes"
    data-title="Asistente Noctua"
    data-color="#111827"
    defer
  ></script>
</body>
</html>
